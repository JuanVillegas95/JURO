services:
  postgres:
    image: postgres:16-alpine
    container_name: juro-postgres
    environment:
      POSTGRES_DB: juro
      POSTGRES_USER: juro
      POSTGRES_PASSWORD: juro
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U juro -d juro"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
